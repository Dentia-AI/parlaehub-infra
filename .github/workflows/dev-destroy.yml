name: Destroy Dev Environment

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch name of dev environment to destroy'
        required: true
        type: string
  pull_request:
    types: [closed]
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  destroy:
    name: Destroy Dev Environment
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Set environment variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH_NAME="${{ inputs.branch_name }}"
          else
            BRANCH_NAME="${{ github.head_ref }}"
          fi
          
          ENV_SUFFIX=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | cut -c1-20)
          
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "env_suffix=$ENV_SUFFIX" >> $GITHUB_OUTPUT
          echo "workspace_name=dev-$ENV_SUFFIX" >> $GITHUB_OUTPUT

      - name: Terraform Init
        working-directory: ./environments/dev
        run: terraform init

      - name: Select Workspace
        id: select_workspace
        working-directory: ./environments/dev
        run: |
          if terraform workspace select ${{ steps.vars.outputs.workspace_name }}; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Terraform Destroy
        if: steps.select_workspace.outputs.exists == 'true'
        working-directory: ./environments/dev
        run: |
          terraform destroy -auto-approve \
            -var="branch_name=${{ steps.vars.outputs.branch_name }}" \
            -var="aurora_dev_password=${{ secrets.AURORA_DEV_PASSWORD }}" \
            -var="ecr_repository_url=${{ secrets.ECR_REPOSITORY_URL }}" \
            -var="discourse_image_tag=dummy" \
            -var="listener_priority_offset=0"

      - name: Delete Workspace
        if: steps.select_workspace.outputs.exists == 'true'
        working-directory: ./environments/dev
        run: |
          terraform workspace select default
          terraform workspace delete ${{ steps.vars.outputs.workspace_name }}

      - name: Clean up SSM Parameters
        if: steps.select_workspace.outputs.exists == 'true'
        run: |
          aws ssm delete-parameters --names $(
            aws ssm get-parameters-by-path \
              --path "/parlaehub/dev/${{ steps.vars.outputs.env_suffix }}" \
              --recursive \
              --query 'Parameters[].Name' \
              --output text
          ) || true

      - name: Comment PR with Destruction Notice
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### 🗑️ Dev Environment Destroyed
            
            **Environment**: \`${{ steps.vars.outputs.workspace_name }}\` has been destroyed.
            
            All resources have been cleaned up:
            - ECS Service
            - Aurora Serverless cluster
            - Redis cluster
            - S3 bucket
            - SSM parameters
            
            ---
            *Cost savings: ~$2-5/day*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Output Summary
        run: |
          echo "## Dev Environment Destroyed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: \`${{ steps.vars.outputs.workspace_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All AWS resources have been cleaned up." >> $GITHUB_STEP_SUMMARY

